name: GroceryStore CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  
  backend-libraries:
    name: 🧩 Backend Libraries Build & Test
    uses: ./.github/workflows/backend-libs-ci.yml
    with:
      dotnet-version: "10.0.x"

  backend:
    name: 🔧 Backend Build & Test
    needs: [backend-libraries]
    uses: ./.github/workflows/backend-ci.yml
    with:
      dotnet-version: "10.0.x"

  frontend:
    name: 🌐 Frontend Build & Test
    uses: ./.github/workflows/frontend-ci.yml

  deploy:
    name: 🚀 Deploy GroceryStore.Web (MSDeploy)
    needs: [backend, frontend]
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish GroceryStore.Web
        run: dotnet publish src/frontend/GroceryStore.Web/GroceryStore.Web.csproj -c Release -o ./artifacts/web-publish

      - name: Deploy via MSDeploy (Web Deploy)
        run: |
          $msdeploy = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          $source = "-source:contentPath=${{ github.workspace }}\artifacts\web-publish"
          $dest = '-dest:contentPath="girover-001-site1",computerName="https://win6215.site4now.net:8172/msdeploy.axd?site=girover-001-site1",userName="girover-001",password="${{ secrets.MSDEPLOY_PASSWORD }}",authType="Basic"'
          & $msdeploy -verb:sync $source $dest -allowUntrusted -enableRule:AppOffline
        shell: pwsh

name: GroceryStore CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  
  backend-libraries:
    name: 🧩 Backend Libraries Build & Test
    uses: ./.github/workflows/backend-libs-ci.yml
    with:
      dotnet-version: "10.0.x"

  backend:
    name: 🔧 Backend Build & Test
    needs: [backend-libraries]
    uses: ./.github/workflows/backend-ci.yml
    with:
      dotnet-version: "10.0.x"

  deploy:
    name: 🚀 Deploy GroceryStore.Web (MSDeploy)
    needs: [backend]
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish GroceryStore.Web
        run: dotnet publish src/frontend/GroceryStore.Web/GroceryStore.Web.csproj -c Release -o ./publish

      - name: Deploy via Web Deploy
        uses: talunzhang/auto-web-deploy@v1.0.1
        with:
          website-name: girover-001-site1
          server-computer-name: https://win6215.site4now.net:8172
          server-username: ${{ secrets.MSDEPLOY_USERNAME }}
          server-password: ${{ secrets.MSDEPLOY_PASSWORD }}

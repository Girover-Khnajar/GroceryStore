name: GroceryStore CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  
  backend-libraries:
    name: 🧩 Backend Libraries Build & Test
    uses: ./.github/workflows/backend-libs-ci.yml
    with:
      dotnet-version: "10.0.x"

  backend:
    name: 🔧 Backend Build & Test
    needs: [backend-libraries]
    uses: ./.github/workflows/backend-ci.yml
    with:
      dotnet-version: "10.0.x"

  frontend:
    name: 🌐 Frontend Build & Test
    uses: ./.github/workflows/frontend-ci.yml

  deploy:
    name: 🚀 Deploy GroceryStore.Web (FTP)
    needs: [backend, frontend]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish GroceryStore.Web
        run: dotnet publish src/frontend/GroceryStore.Web/GroceryStore.Web.csproj -c Release -o ./artifacts/web-publish

      - name: Deploy to hosting via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: win6215.site4now.net
          protocol: ftp
          port: 21
          username: girover-001
          password: ${{ secrets.SITE1_FTP_PASSWORD }}
          local-dir: ./artifacts/web-publish/
          server-dir: /naem/
          dangerous-clean-slate: false
